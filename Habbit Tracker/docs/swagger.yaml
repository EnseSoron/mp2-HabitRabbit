        "404":
          description: Привычка не найдена
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Управление конкретной привычкой
      tags:
      - habits
  /health:
    get:
      consumes:
      - application/json
      description: Проверяет, работает ли сервер и доступна ли база данных
      produces:
      - application/json
      responses:
        "200":
          description: статус сервера
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: База данных недоступна
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
      summary: Проверка здоровья
      tags:
      - system
  /login:
    post:
      consumes:
      - application/json
      description: Аутентификация пользователя по email и паролю
      parameters:
      - description: Учетные данные
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_server.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешный вход, возвращается JWT токен
          schema:
            $ref: '#/definitions/cmd_server.LoginResponse'
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
        "401":
          description: Неверный email или пароль
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
      summary: Вход в систему
      tags:
      - auth
  /me:
    get:
      consumes:
      - application/json
      description: Возвращает данные авторизованного пользователя
      produces:
      - application/json
      responses:
        "200":
          description: Информация о пользователе
          schema:
            $ref: '#/definitions/cmd_server.User'
        "401":
          description: Не авторизован или неверный токен
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить информацию о себе
      tags:
      - user
  /register:
    post:
      consumes:
      - application/json
      description: |-
        Создает нового пользователя в системе. Email должен быть уникальным.
        Пароль должен быть минимум 6 символов.
      parameters:
      - description: Данные пользователя
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_server.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Пользователь успешно создан, возвращается токен
          schema:
            $ref: '#/definitions/cmd_server.LoginResponse'
        "400":
          description: Неверный формат JSON или невалидные данные
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
        "409":
          description: Email уже зарегистрирован
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
      summary: Регистрация нового пользователя
      tags:
      - auth
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'Для доступа к защищенным эндпоинтам необходимо добавить заголовок:
      Authorization: Bearer {ваш-jwt-токен}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
