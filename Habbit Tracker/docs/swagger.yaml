      - description: ID привычки (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления привычки
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Информация о привычке (для GET)
          schema:
            $ref: '#/definitions/cmd_server.Habit'
        "204":
          description: Привычка успешно удалена (для DELETE)
        "400":
          description: Неверный формат ID
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/cmd_server.ErrorResponse'
        "403":
